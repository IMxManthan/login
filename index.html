
<!DOCTYPE html>
<html>
<head>
<title>Simple Login</title>
<style>
  body {
    font-family: Arial;
    background: #f1f1f1;
    display: flex;
    justify-content: center;
    margin-top: 60px;
  }
  .box {
    background: #fff;
    padding: 20px;
    width: 300px;
    border-radius: 8px;
    box-shadow: 0 0 8px #ccc;
  }
  input {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    border: 1px solid #aaa;
    border-radius: 5px;
  }
  button {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    border: 0;
    background: #2979ff;
    color: white;
    cursor: pointer;
    border-radius: 5px;
  }
  .error {
    color: red;
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="box">
  <h2>Login</h2>

  <input type="text" id="user" placeholder="Username">
  <p class="error" id="uErr"></p>

  <input type="email" id="email" placeholder="Email">
  <p class="error" id="eErr"></p>

  <input type="password" id="pass" placeholder="Password">
  <p class="error" id="pErr"></p>

  <button onclick="validate()">Submit</button>
</div>

<script>
function validate() {
  let user = document.getElementById("user").value.trim();
  let email = document.getElementById("email").value.trim();
  let pass = document.getElementById("pass").value.trim();

  let ok = true;

  document.getElementById("uErr").innerHTML = user === "" ? "Enter username" : "";
  if(user === "") ok = false;

  document.getElementById("eErr").innerHTML = (!email.includes("@") || !email.includes(".")) 
    ? "Enter valid email" : "";
  if(!email.includes("@") || !email.includes(".")) ok = false;

  document.getElementById("pErr").innerHTML = pass.length < 5 ? "Min 5 chars" : "";
  if(pass.length < 5) ok = false;

  if(ok) alert("Login Successful!");
}
</script>

</body>
</html>
