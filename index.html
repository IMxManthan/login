<!DOCTYPE html>
<html>
<head>
<title>Simple Login</title>

<style>
  body{
    font-family: Arial;
    background:#f1f1f1;
    display:flex;
    justify-content:center;
    margin-top:60px;
  }
  .box{
    background:#fff;
    padding:20px;
    width:300px;
    border-radius:8px;
    box-shadow:0 0 8px #ccc;
  }
  input,button{
    width:100%;
    padding:8px;
    margin-top:8px;
    border-radius:5px;
  }
  input{ border:1px solid #aaa; }
  button{
    padding:10px;
    border:0;
    background:#2979ff;
    color:#fff;
    cursor:pointer;
  }
  .error{ color:red;font-size:13px; }
</style>

</head>
<body>

<div class="box">
  <h2>Login</h2>

  <input id="user" placeholder="Username">
  <p class="error" id="uErr"></p>

  <input type="email" id="email" placeholder="Email">
  <p class="error" id="eErr"></p>

  <input type="password" id="pass" placeholder="Password">
  <p class="error" id="pErr"></p>

  <button onclick="validate()">Submit</button>
</div>

<script>
  const $ = id => document.getElementById(id);

  function err(id, msg){
    $(id).textContent = msg;
    return msg === "";
  }

  function validate(){
    const user = $("user").value.trim(),
          email = $("email").value.trim(),
          pass = $("pass").value.trim();

    const uOK = err("uErr", user ? "" : "Enter username");
    const eOK = err("eErr", (email.includes("@") && email.includes(".")) ? "" : "Enter valid email");
    const pOK = err("pErr", pass.length >= 5 ? "" : "Min 5 chars");

    if(uOK && eOK && pOK) alert("Login Successful!");
  }
</script>

</body>
</html>
